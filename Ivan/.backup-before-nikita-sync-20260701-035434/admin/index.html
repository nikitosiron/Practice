                    </svg>
                </span>
                <div class="sidebar-logo-text">
                    <div class="sidebar-logo-title">TravelLine</div>
                    <div class="sidebar-logo-sub">Админ-панель</div>
                </div>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-group-label">Блоки страницы</div>
                <button type="button" class="nav-item active" data-section="hero">
                    <span class="nav-icon">⭐</span>
                    <span>О нас</span>
                </button>
                <button type="button" class="nav-item" data-section="team">
                    <span class="nav-icon">👥</span>
                    <span>Сотрудники</span>
                </button>
                <button type="button" class="nav-item" data-section="positions">
                    <span class="nav-icon">📋</span>
                    <span>Должности</span>
                </button>
                <button type="button" class="nav-item" data-section="vacancies">
                    <span class="nav-icon">💼</span>
                    <span>Вакансии</span>
                </button>
                <button type="button" class="nav-item" data-section="benefits">
                    <span class="nav-icon">🎁</span>
                    <span>Плюшки</span>
                </button>

                <div class="nav-group-label">Просмотр</div>
                <a class="nav-item" href="/" target="_blank" rel="noopener">
                    <span class="nav-icon">👁️</span>
                    <span>Открыть сайт</span>
                </a>
            </nav>
        </aside>

        <main class="main">

            <header class="topbar">
                <div class="breadcrumb">
                    <span class="breadcrumb-home">🏠</span>
                    <span class="breadcrumb-sep">/</span>
                    <span class="breadcrumb-current" id="breadcrumb">О нас</span>
                </div>
                <p class="status" id="status"></p>
            </header>

            <div class="stat-cards">
                <div class="stat-card">
                    <div class="stat-label">Сотрудников</div>
                    <div class="stat-value" id="stat-team">—</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Вакансий</div>
                    <div class="stat-value" id="stat-vacancies">—</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Плюшек</div>
                    <div class="stat-value" id="stat-benefits">—</div>
                </div>
                <div class="stat-card stat-card--accent">
                    <div class="stat-label">Активный блок</div>
                    <div class="stat-value" id="stat-active">О нас</div>
                </div>
            </div>

            <section class="block active hero-section" data-block="hero" id="hero">
                <h2 class="section-title">О компании — ключевые показатели</h2>

                <div class="hero-field">
                    <label class="field-label">Заголовок</label>
                    <input type="text" class="field-input hero__title" id="hero-title" value="">
                </div>

                <h3 class="subsection-title">Ключевые показатели</h3>
                <div class="stats-list advantages__list" id="hero-stats"></div>

                <div class="section-actions">
                    <button type="button" class="btn add" id="hero-add-stat">+ Добавить показатель</button>
                    <button type="button" class="btn primary" id="hero-save">Сохранить раздел</button>
                </div>
            </section>

            <section class="block team-section" data-block="team" id="team">
                <h2 class="section-title">Сотрудники</h2>

                <div class="section-toolbar">
                    <input type="text" class="field-input search-input" id="team-search" placeholder="Поиск по имени или должности...">
                    <div class="view-toggle">
                        <button type="button" class="btn view-btn active" id="view-cards">Карточки</button>
                        <button type="button" class="btn view-btn" id="view-table">Таблица</button>
                    </div>
                </div>

                <div class="cards-grid team__list" id="team-list"></div>
                <div class="table-wrap" id="team-table-wrap" style="display:none">
                    <table class="data-table" id="team-table">
                        <thead>
                            <tr>
                                <th>Фото</th>
                                <th>Имя</th>
                                <th>Должность</th>
                                <th>Статус</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody id="team-table-body"></tbody>
                    </table>
                </div>
                <button type="button" class="btn add" id="team-add">+ Добавить сотрудника</button>
            </section>

            <section class="block positions-section" data-block="positions" id="positions">
                <h2 class="section-title">Должности</h2>
                <div class="cards-grid" id="positions-list"></div>
                <button type="button" class="btn add" id="positions-add">+ Добавить должность</button>
            </section>

            <section class="block vacancies-section" data-block="vacancies" id="vacancies">
                <h2 class="section-title">Вакансии</h2>
                <div class="section-toolbar">
                    <input type="text" class="field-input search-input" id="vacancies-search" placeholder="Поиск по названию вакансии...">
                </div>
                <div class="cards-grid vacancies__list" id="vacancies-list"></div>
                <button type="button" class="btn add" id="vacancies-add">+ Добавить вакансию</button>
            </section>

            <section class="block benefits-section" data-block="benefits" id="benefits">
                <h2 class="section-title">Плюшки</h2>
                <div class="cards-grid bonus__list" id="benefits-list"></div>
                <button type="button" class="btn add" id="benefits-add">+ Добавить бонус</button>
            </section>

            <footer class="admin-footer">
                <p>© 2026 TravelLine Tech — Админ-панель</p>
            </footer>

        </main>
    </div>

    <script src="admin.js"></script>
</body>
</html>
